[unstable]
codegen-backend = true

[profile.dev]
codegen-backend = "cranelift"

[profile.dev.package."*"]
codegen-backend = "llvm"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld", "-Zshare-generics=y"]

[target.x86_64-pc-windows-msvc]
linker = "lld"
rustflags = [
  "-Lnative=/home/noahl/.xwin/crt/lib/x86_64",
  "-Lnative=/home/noahl/.xwin/sdk/lib/um/x86_64",
  "-Lnative=/home/noahl/.xwin/sdk/lib/ucrt/x86_64",
  "-Zshare-generics=y"
]
